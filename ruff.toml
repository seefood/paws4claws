line-length = 160
target-version = "py311"

[lint]
select = [
    "E", "W",  # pycodestyle (errors + warnings)
    "F",       # pyflakes: unused imports (replaces autoflake), undefined names
    "I",       # isort: import ordering
    "UP",      # pyupgrade: syntax modernisation (replaces pyupgrade hook)
    "B",       # flake8-bugbear
    "C4",      # flake8-comprehensions
    "SIM",     # flake8-simplify
    "PL",      # pylint rules (replaces pylint hooks)
    "N",       # pep8-naming
    "PERF",    # perflint: performance anti-patterns
    "RUF",     # ruff-specific rules
]

ignore = [
    # Docstrings not enforced — matches pylint.ini C0114/C0115/C0116 disabled
    "D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107",

    # pylint.ini disabled → ruff equivalents
    # PLR0903 (too-few-public-methods) — not implemented in ruff
    "PLR0912",  # too-many-branches             (R0912) — ML training/inference functions are legitimately complex
    "PLR0913",  # too-many-arguments            (R0913) — ML trainer signatures are wide by design
    "PLR0915",  # too-many-statements           (R0915) — same as above
    # PLW0511 (fixme/TODO comments) — not implemented in ruff
    # PLR0801 (duplicate-code) — not implemented in ruff
    "BLE001",   # blind exception catching      (W0718) — 450+ sites; long-term refactor
    "G004",     # f-string in logging calls     (W1203) — 460+ sites; style preference
    "PLR2004",  # magic value comparison        (pre-existing, intentional)
    "PLR0911",  # too-many-return-statements    (parsing/transform functions)
    "B008",     # Depends() in defaults         (FastAPI idiomatic pattern)
    "PLC0415",  # import not at top level       (optional-dep guard pattern; 500+ sites)
    "SIM108",   # ternary suggestion            (often less readable)
    "SIM105",   # contextlib.suppress           (try/except/pass clarity)
    "N811",     # constant imported as non-const (aliased imports like PCA as SklearnPCA)
]

[lint.pylint]
max-args = 10
max-branches = 12
max-statements = 50

[lint.isort]
# Treat monorepo tiers as first-party so isort groups them correctly
known-first-party = ["common", "shared", "projects", "simpleai", "agretools"]

[lint.per-file-ignores]

# Relaxed rules for test files — mirrors pylint-tests hook settings
"**/*_test.py" = [
    "F842",     # annotated variable never used   (test-only annotation patterns)
    "SLF001", "ARG001", "ARG002", "F841", "PLR2004", "S101",
]
"**/test_*.py" = [
    "SLF001",   # private member access           (W0212)
    "ARG001",   # unused function argument        (W0613 — pytest fixtures)
    "ARG002",   # unused method argument
    "F841",     # local variable assigned, unused (W0612)
    "F842",     # annotated variable never used   (test-only annotation patterns)
    "F811",     # redefinition of unused name     (pytest parametrize patterns)
    "PLR2004",  # magic value comparison
    "PLR0124",  # name compared with itself       (intentional identity checks in tests)
    "PLR0133",  # two constants compared          (intentional assertion patterns)
    "S101",     # use of assert
    "N802",     # function name not lowercase     (C0103 relaxation)
    "N803",     # argument name not lowercase
    "N806",     # variable in function not lowercase
    "N812",     # lowercase imported as non-lowercase
    "N814",     # camelcase imported as constant
    "N817",     # camelcase imported as acronym
    "E402",     # module import not at top        (test setup often requires path manipulation)
    "E501",     # line too long                   (long assertion strings in tests)
    "E722",     # bare-except — RDKit/scipy error types unpredictable in test helpers
    "RUF001",   # ambiguous unicode in string     (test data may contain intentional unicode)
    "RUF003",   # ambiguous unicode in comment    (test comments)
    "RUF012",   # mutable class attribute         (test fixture classes)
    "RUF059",   # unpacked variable never used    (test destructuring patterns)
    "PERF401",  # list comprehension suggestion   (test readability)
    "PERF402",  # manual list copy                (test clarity)
    "PLW0603",  # global statement                (test fixtures using module-level state)
    "PLW1510",  # subprocess without check        (tests may intentionally ignore subprocess return)
    "SIM117",   # nested with statement           (test readability, nested mocks)
    "B017",     # assert blind exception          (tests may intentionally catch any exception)
]
"**/tests/**/*.py" = [
    "SLF001",
    "ARG001",
    "ARG002",
    "F841",
    "F842",
    "F811",
    "PLR2004",
    "PLR0124",
    "PLR0133",
    "S101",
    "N802",
    "N803",
    "N806",
    "N812",
    "N814",
    "N817",
    "E402",
    "E501",
    "RUF001",
    "RUF003",
    "RUF012",
    "RUF059",
    "PERF401",
    "PERF402",
    "PLW0603",
    "PLW1510",
    "SIM117",
    "B017",
]
